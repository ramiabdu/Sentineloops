version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace/backend
    command: ["bash", "-lc", "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    volumes:
      - ../:/workspace
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sentinelops
      POSTGRES_USER: sentinelops
      POSTGRES_PASSWORD: sentinelops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
